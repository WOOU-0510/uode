# 릴리즈 API 토큰 (둘 다 등록하는 게 아님)
# - GitHub가 자동으로 주는 GITHUB_TOKEN(github.token): 별도 시크릿으로 만들지 않음.
# - TAURI_RELEASE_TOKEN: (선택) checkout만 PAT가 필요할 때(비공개 서브모듈 등). 릴리스 API는 github.token 사용.
#   조직 시크릿에 동일 이름이 있으면 저장소에서 지워도 워크플로는 계속 그 값을 씀.
#   릴리스 업로드 403(integration)이면: 이 시크릿이 잘못된 PAT이면 tauri-action에 넘어가지 않도록 아래처럼 분리됨.
name: Tauri Release (Auto Update)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-tauri:
    # 워크플로 최상단 permissions와 동일하게 job에도 명시 (조직/상속 이슈 대비)
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TAURI_RELEASE_TOKEN || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Tauri/turbo가 띄운 하위 프로세스에도 turbo·tsdown·tauri 등이 PATH에서 잡히도록 (로컬과 동일)
      - name: Expose workspace node_modules/.bin on PATH
        shell: bash
        run: echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"

      # 태그(v0.2.0) → semver(0.2.0)로 Cargo/tauri 버전 동기화 (빌드·latest.json과 일치)
      - name: Sync app version from release tag
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          derived="${REF_NAME#v}"
          if [[ -z "$derived" ]]; then
            echo "Could not derive semver from tag: $REF_NAME"
            exit 1
          fi
          export DERIVED_VER="$derived"
          node <<'NODE'
          const fs = require("fs");
          const ver = process.env.DERIVED_VER;
          if (!ver) {
            throw new Error("DERIVED_VER is empty");
          }
          const cargoPath = "src-tauri/Cargo.toml";
          let cargo = fs.readFileSync(cargoPath, "utf8");
          const updated = cargo.replace(/^version = "[^"]*"/m, `version = "${ver}"`);
          if (updated === cargo) {
            throw new Error("Failed to update version in Cargo.toml");
          }
          fs.writeFileSync(cargoPath, updated);
          const tauriPath = "src-tauri/tauri.conf.json";
          const conf = JSON.parse(fs.readFileSync(tauriPath, "utf8"));
          conf.version = ver;
          fs.writeFileSync(tauriPath, JSON.stringify(conf, null, 2) + "\n");
          NODE

      - name: Build and publish with tauri-action
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          # b9456ff 당시 secrets.GITHUB_TOKEN은 존재 불가(빈 값) → 사실상 러너 토큰과 동일. PAT는 릴리스 API에 쓰지 않음.
          GITHUB_TOKEN: ${{ github.token }}
        with:
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
          tauriScript: bun run tauri
          # WiX(MSI)는 프리릴리즈에 문자열(beta 등)이 있으면 실패함. 업데이터는 NSIS 우선이므로 MSI 생략.
          args: --bundles nsis
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: "Automated release for ${{ github.ref_name }}"
          releaseCommitish: ${{ github.sha }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-beta.') }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          # Git 태그 문자열과 업로드 파일명 일치 (예: uode-v0.2.0-installer-windows.exe)
          assetNamePattern: "uode-${{ github.ref_name }}-installer-[platform][ext]"
