name: Tauri Release (Auto Update)

on:
  push:
    tags:
      - "v*"

# GITHUB_TOKEN으로 Release 생성·에셋 업로드에 필요 (없으면 "Resource not accessible by integration")
permissions:
  contents: write

jobs:
  release-tauri:
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Tauri/turbo가 띄운 하위 프로세스에도 turbo·tsdown·tauri 등이 PATH에서 잡히도록 (로컬과 동일)
      - name: Expose workspace node_modules/.bin on PATH
        shell: bash
        run: echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"

      # 태그(v0.2.0) → semver(0.2.0)로 Cargo/tauri 버전 동기화 (빌드·latest.json과 일치)
      - name: Sync app version from release tag
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          derived="${REF_NAME#v}"
          if [[ -z "$derived" ]]; then
            echo "Could not derive semver from tag: $REF_NAME"
            exit 1
          fi
          export DERIVED_VER="$derived"
          node <<'NODE'
          const fs = require("fs");
          const ver = process.env.DERIVED_VER;
          if (!ver) {
            throw new Error("DERIVED_VER is empty");
          }
          const cargoPath = "src-tauri/Cargo.toml";
          let cargo = fs.readFileSync(cargoPath, "utf8");
          const updated = cargo.replace(/^version = "[^"]*"/m, `version = "${ver}"`);
          if (updated === cargo) {
            throw new Error("Failed to update version in Cargo.toml");
          }
          fs.writeFileSync(cargoPath, updated);
          const tauriPath = "src-tauri/tauri.conf.json";
          const conf = JSON.parse(fs.readFileSync(tauriPath, "utf8"));
          conf.version = ver;
          fs.writeFileSync(tauriPath, JSON.stringify(conf, null, 2) + "\n");
          NODE

      - name: Build and publish with tauri-action
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          # 기본은 워크플로 자동 토큰(github.token). 조직 정책 등으로 Release API가 막히면
          # repo Contents 쓰기 가능한 PAT를 시크릿 TAURI_RELEASE_TOKEN 으로 넣으면 그걸 사용함.
          GITHUB_TOKEN: ${{ secrets.TAURI_RELEASE_TOKEN != '' && secrets.TAURI_RELEASE_TOKEN || github.token }}
        with:
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
          tauriScript: bun run tauri
          # WiX(MSI)는 프리릴리즈에 문자열(beta 등)이 있으면 실패함. 업데이터는 NSIS 우선이므로 MSI 생략.
          args: --bundles nsis
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: "Automated release for ${{ github.ref_name }}"
          releaseCommitish: ${{ github.sha }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-beta.') }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          # Git 태그 문자열과 업로드 파일명 일치 (예: uode-v0.2.0-installer-windows.exe)
          assetNamePattern: "uode-${{ github.ref_name }}-installer-[platform][ext]"
