# 토큰
# - github.token: 기본. 릴리스 403(Resource not accessible by integration)이면 런타임에 Contents가 read로만 부여된 것.
#   실패한 run → "Set up job" 로그의 "GITHUB_TOKEN Permissions"에서 Contents가 write인지 확인.
#   조직 WOOU-0510 → Settings → Actions → General → Workflow permissions 가 Read/Write 인지(저장소 설정만으로는 부족할 수 있음).
# - TAURI_RELEASE_TOKEN: (선택) checkout만. 조직 시크릿에 있으면 저장소에서 지워도 계속 사용됨.
# - TAURI_RELEASE_PUBLISH_TOKEN: (선택) 위 조직 정책으로 github.token이 쓰기 불가일 때만. tauri-action(릴리스·에셋)에만 사용.
#   Classic PAT: repo. Fine-grained: 해당 저장소 Contents Read and write + Metadata, 조직 SAML이면 PAT SSO 승인.
name: Tauri Release (Auto Update)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-tauri:
    # 워크플로 최상단 permissions와 동일하게 job에도 명시 (조직/상속 이슈 대비)
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TAURI_RELEASE_TOKEN || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Tauri/turbo가 띄운 하위 프로세스에도 turbo·tsdown·tauri 등이 PATH에서 잡히도록 (로컬과 동일)
      - name: Expose workspace node_modules/.bin on PATH
        shell: bash
        run: echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"

      # 태그(v0.2.0) → semver(0.2.0)로 Cargo/tauri 버전 동기화 (빌드·latest.json과 일치)
      - name: Sync app version from release tag
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          derived="${REF_NAME#v}"
          if [[ -z "$derived" ]]; then
            echo "Could not derive semver from tag: $REF_NAME"
            exit 1
          fi
          export DERIVED_VER="$derived"
          node <<'NODE'
          const fs = require("fs");
          const ver = process.env.DERIVED_VER;
          if (!ver) {
            throw new Error("DERIVED_VER is empty");
          }
          const cargoPath = "src-tauri/Cargo.toml";
          let cargo = fs.readFileSync(cargoPath, "utf8");
          const updated = cargo.replace(/^version = "[^"]*"/m, `version = "${ver}"`);
          if (updated === cargo) {
            throw new Error("Failed to update version in Cargo.toml");
          }
          fs.writeFileSync(cargoPath, updated);
          const tauriPath = "src-tauri/tauri.conf.json";
          const conf = JSON.parse(fs.readFileSync(tauriPath, "utf8"));
          conf.version = ver;
          fs.writeFileSync(tauriPath, JSON.stringify(conf, null, 2) + "\n");
          NODE

      - name: Build and publish with tauri-action
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          # 조직이 GITHUB_TOKEN 쓰기를 막으면 TAURI_RELEASE_PUBLISH_TOKEN(권한 있는 PAT) 등록
          GITHUB_TOKEN: ${{ secrets.TAURI_RELEASE_PUBLISH_TOKEN || github.token }}
        with:
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
          tauriScript: bun run tauri
          # WiX(MSI)는 프리릴리즈에 문자열(beta 등)이 있으면 실패함. 업데이터는 NSIS 우선이므로 MSI 생략.
          args: --bundles nsis
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: "Automated release for ${{ github.ref_name }}"
          releaseCommitish: ${{ github.sha }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-beta.') }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          # Git 태그 문자열과 업로드 파일명 일치 (예: uode-v0.2.0-installer-windows.exe)
          assetNamePattern: "uode-${{ github.ref_name }}-installer-[platform][ext]"
