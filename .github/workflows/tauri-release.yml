name: Tauri Release (Auto Update)

on:
  push:
    tags:
      - "v*"

jobs:
  release-tauri:
    permissions:
      contents: read
    runs-on: windows-latest
    env:
      RELEASE_REPO: ${{ secrets.RELEASE_REPO }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Parse release repository
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_REPO)) {
            throw "RELEASE_REPO secret is missing (expected: owner/repo)."
          }
          $parts = $env:RELEASE_REPO.Split("/")
          if ($parts.Length -ne 2) {
            throw "RELEASE_REPO must be in owner/repo format."
          }
          "RELEASE_OWNER=$($parts[0])" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_NAME=$($parts[1])" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build and publish with tauri-action
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_RELEASE_REPO }}
        with:
          owner: ${{ env.RELEASE_OWNER }}
          repo: ${{ env.RELEASE_NAME }}
          tauriScript: bun run tauri
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: "Automated release for ${{ github.ref_name }}"
          releaseCommitish: ${{ github.sha }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-beta.') }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          assetNamePattern: "uode-[version]-installer-[platform][ext]"

